# Gitleaks Configuration for YVON Project
# Secret detection rules aligned with CLAUDE.md security protocols

[rule]
id = 010
regex = 'supabase[^a-z]*([A-Z0-9]{2,}|"[A-Za-z0-9+/=]{30,}")'
description = "Supabase service role key pattern detection"
severity = HIGH

[rule]
id = 014
regex = '\b(AKIA|AGPC|ASIA|ABOP|ACCA)_[A-Z0-9]{16}'
description = "AWS access key patterns"
severity = CRITICAL

[rule]
id = 021
regex = 'ghp_[A-Za-z0-9]{36}'
description = "GitHub personal access token pattern"
severity = HIGH
