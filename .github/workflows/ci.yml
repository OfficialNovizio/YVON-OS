name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
      - develop
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '0 2 * * 1' # Weekly Monday at 2 AM

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npm run typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test

  e2e-tests:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !contains(github.head_ref, '[skip-e2e]')
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run E2E tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npm run test:e2e

  security-scan:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run security audit
        run: npm audit --audit-level=high

  prepare-for-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !contains(github.head_ref, '[skip-deploy]')
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build

  deploy-production:
    needs: prepare-for-deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !contains(github.head_ref, '[skip-deploy]')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          production-deployment: true

  deploy-dev:
    runs-on: ubuntu-latest
    needs: prepare-for-deploy
    environment: development
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build
      - name: Deploy to Vercel (development)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}

# Branch Protection Rules for Review Workflow
branch_protection_rules:
  main:
    required_pull_requests: 1
    required_status_checks: [passing]
    enforce_administration: true
    required_conversation_resolution: true
    allows_force_pushes: false
    requires_linear_history: true
    head_filters:
      - allow:
          branch_names:
            regex: '^(?!.*[\\\\]).*$'

# Code Review Protocol for YVON
review_protocols:
  war_room_sessions:
    max_specialists: 2
    required_for: [strategy, budget, brand-direction]

  pulse_checks:
    frequency: weekly
    responsible_agent: quinn
    frequency: weekly
    responsible_agent: quinn

  sip_required_when: [3+ tool_calls, data_tasks, content_publishing]
